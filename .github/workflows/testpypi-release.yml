name: TestPyPI release

on:
  push:
    tags:
      - "testpypi-v*"
  workflow_dispatch:
    inputs:
      publish_to_testpypi:
        description: "Publish the built artifacts to TestPyPI"
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Rust
        if: ${{ hashFiles('Cargo.toml') != '' }}
        uses: dtolnay/rust-toolchain@stable

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Check tag version
        if: ${{ startsWith(github.ref, 'refs/tags/testpypi-v') }}
        run: |
          python - "${GITHUB_REF_NAME#testpypi-v}" <<'PY'
          from pathlib import Path
          import re
          import sys
          import tomllib

          expected = sys.argv[1]
          data = tomllib.loads(Path("pyproject.toml").read_text())
          actual = (
              data.get("project", {}).get("version")
              or data.get("tool", {}).get("poetry", {}).get("version")
          )
          if actual is None and Path("setup.py").exists():
              match = re.search(
                  r"version\s*=\s*['\"]([^'\"]+)['\"]",
                  Path("setup.py").read_text(),
              )
              actual = match.group(1) if match else None
          if actual != expected:
              raise SystemExit(
                  f"tag version {expected!r} does not match package version {actual!r}"
              )
          PY

      - name: Build artifacts
        run: scripts/build-testpypi-artifacts.sh

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    name: Publish to TestPyPI
    needs: build
    if: >-
      ${{
        startsWith(github.ref, 'refs/tags/testpypi-v')
        || (github.event_name == 'workflow_dispatch'
            && inputs.publish_to_testpypi)
      }}
    runs-on: ubuntu-latest
    environment: testpypi
    env:
      TEST_PYPI_API_TOKEN: ${{ secrets.TEST_PYPI_API_TOKEN }}
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to TestPyPI with token secret
        if: ${{ env.TEST_PYPI_API_TOKEN != '' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          password: ${{ env.TEST_PYPI_API_TOKEN }}
          skip-existing: true
          attestations: false

      - name: Publish to TestPyPI with trusted publishing
        if: ${{ env.TEST_PYPI_API_TOKEN == '' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          skip-existing: true
          attestations: false
